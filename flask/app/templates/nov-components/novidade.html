<style>
    /*
     * ===== Grid que organiza os cards lado a lado =====
     * Cada GRUPO de 4 novidades forma 2 linhas do grid:
     *   linha N   = item A (col 1) + item B (col 2)
     *   linha N+1 = item D (col 1) + item C (col 2)
     * O grid-row de cada item é definido explicitamente via nth-child
     * (ver mixin de linhas mais abaixo) para que o grid nunca "quebre"
     * quando um card for mais alto que o vizinho.
     */
    .lista-novidades {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2.5rem 2rem;
        padding: 0 2rem;
    }

    .novidade-section {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        min-width: 0; /* evita overflow de grid */
    }

    .novidade-titulo {
        font-family: 'xilosa', sans-serif;
        font-size: 2rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
    }

    .novidade {
        display: flex;
        flex: 1;
        gap: 0;
        border-radius: 20px;
        overflow: hidden;
    }

    .novidade-conteudo {
        flex: 1;
        display: flex;
        align-items: center;
        padding: 2rem;
    }

    .novidade-conteudo p {
        margin: 0;
        line-height: 1.5;
    }

    .novidade-imagem {
        flex-shrink: 0;
        margin: 0;
        overflow: hidden;
    }

    .novidade-imagem img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .novidade-barra {
        flex-shrink: 0;
        width: 12px;
        background: #000;
    }

    /*
     * Cores alternam em ciclo de 4, igual ao design.
     * Tipo A=verde-água, B=verde-oliva, C=laranja, D=rosa.
     */
    .novidade-section:nth-child(4n+1) .novidade { background: #A1D7CA; }
    .novidade-section:nth-child(4n+2) .novidade { background: #C4D0AB; }
    .novidade-section:nth-child(4n+3) .novidade { background: #F4BF95; }
    .novidade-section:nth-child(4n+4) .novidade { background: #F3AEA5; }

    /*
     * grid-row explícito por item: cada par (A+B, depois D+C) ocupa
     * a mesma linha do grid. SEM ISSO, se um card for mais alto que
     * o vizinho, o grid empurra o próximo item da mesma coluna para
     * baixo e cria um buraco em branco (auto-placement do CSS Grid
     * não "preenche" colunas com alturas desiguais).
     * Cobre até 40 novidades (20 linhas). Para mais, repita o padrão:
     * cada novo grupo de 4 itens (posições 4n+1..4n+4) ganha 2 linhas novas.
     */
    .novidade-section:nth-child(1)  { grid-row: 1; }
    .novidade-section:nth-child(2)  { grid-row: 1; }
    .novidade-section:nth-child(3)  { grid-row: 2; }
    .novidade-section:nth-child(4)  { grid-row: 2; }
    .novidade-section:nth-child(5)  { grid-row: 3; }
    .novidade-section:nth-child(6)  { grid-row: 3; }
    .novidade-section:nth-child(7)  { grid-row: 4; }
    .novidade-section:nth-child(8)  { grid-row: 4; }
    .novidade-section:nth-child(9)  { grid-row: 5; }
    .novidade-section:nth-child(10) { grid-row: 5; }
    .novidade-section:nth-child(11) { grid-row: 6; }
    .novidade-section:nth-child(12) { grid-row: 6; }
    .novidade-section:nth-child(13) { grid-row: 7; }
    .novidade-section:nth-child(14) { grid-row: 7; }
    .novidade-section:nth-child(15) { grid-row: 8; }
    .novidade-section:nth-child(16) { grid-row: 8; }
    .novidade-section:nth-child(17) { grid-row: 9; }
    .novidade-section:nth-child(18) { grid-row: 9; }
    .novidade-section:nth-child(19) { grid-row: 10; }
    .novidade-section:nth-child(20) { grid-row: 10; }
    .novidade-section:nth-child(21) { grid-row: 11; }
    .novidade-section:nth-child(22) { grid-row: 11; }
    .novidade-section:nth-child(23) { grid-row: 12; }
    .novidade-section:nth-child(24) { grid-row: 12; }
    .novidade-section:nth-child(25) { grid-row: 13; }
    .novidade-section:nth-child(26) { grid-row: 13; }
    .novidade-section:nth-child(27) { grid-row: 14; }
    .novidade-section:nth-child(28) { grid-row: 14; }
    .novidade-section:nth-child(29) { grid-row: 15; }
    .novidade-section:nth-child(30) { grid-row: 15; }
    .novidade-section:nth-child(31) { grid-row: 16; }
    .novidade-section:nth-child(32) { grid-row: 16; }
    .novidade-section:nth-child(33) { grid-row: 17; }
    .novidade-section:nth-child(34) { grid-row: 17; }
    .novidade-section:nth-child(35) { grid-row: 18; }
    .novidade-section:nth-child(36) { grid-row: 18; }
    .novidade-section:nth-child(37) { grid-row: 19; }
    .novidade-section:nth-child(38) { grid-row: 19; }
    .novidade-section:nth-child(39) { grid-row: 20; }
    .novidade-section:nth-child(40) { grid-row: 20; }

    /*
     * Tipo A (1, 5, 9...) — título em cima à esquerda
     * imagem quadrada à ESQUERDA + texto com barra preta à DIREITA
     * ex: "SECITEX IX"
     */
    .novidade-section:nth-child(4n+1) {
        grid-column: 1;
    }
    .novidade-section:nth-child(4n+1) .novidade {
        flex-direction: row;
        background: none; /* a cor vai só na metade do texto */
    }
    .novidade-section:nth-child(4n+1) .novidade-imagem {
        width: 45%;
        aspect-ratio: 1 / 1;
        border-radius: 20px;
        border: 2px solid #000;
    }
    .novidade-section:nth-child(4n+1) .novidade-conteudo {
        background: #A1D7CA;
        border-radius: 0 20px 20px 0;
    }

    /*
     * Tipo B (2, 6, 10...) — sem título, só texto
     * ocupa a coluna da direita, pareado ao lado do Tipo A
     */
    .novidade-section:nth-child(4n+2) {
        grid-column: 2;
    }
    .novidade-section:nth-child(4n+2) .novidade-titulo {
        /* sem título visível neste tipo, como no design (bloco da Exposição Anual) */
        display: none;
    }
    .novidade-section:nth-child(4n+2) .novidade-conteudo {
        text-align: center;
        padding: 2.5rem 2rem;
    }
    .novidade-section:nth-child(4n+2) .novidade-imagem,
    .novidade-section:nth-child(4n+2) .novidade-barra {
        display: none;
    }

    /*
     * Tipo C (3, 7, 11...) — título em cima à direita
     * texto/título em cima + imagem GRANDE embaixo
     * ex: "EXPOSIÇÃO"
     */
    .novidade-section:nth-child(4n+3) {
        grid-column: 2;
    }
    .novidade-section:nth-child(4n+3) .novidade-titulo {
        text-align: right;
    }
    .novidade-section:nth-child(4n+3) .novidade {
        flex-direction: column;
        background: none;
        border: 2px solid #000;
        border-radius: 20px;
    }
    .novidade-section:nth-child(4n+3) .novidade-conteudo {
        display: none; /* este tipo só mostra a imagem grande, texto fica no vizinho Tipo B */
    }
    .novidade-section:nth-child(4n+3) .novidade-imagem {
        width: 100%;
        flex: 1;
        border-radius: 18px;
    }
    .novidade-section:nth-child(4n+3) .novidade-barra {
        display: none;
    }

    /*
     * Tipo D (4, 8, 12...) — sem título, só texto, mais alto
     * ocupa a coluna da esquerda sozinho, ao lado do Tipo C
     */
    .novidade-section:nth-child(4n+4) {
        grid-column: 1;
    }
    .novidade-section:nth-child(4n+4) .novidade-titulo {
        display: none;
    }
    .novidade-section:nth-child(4n+4) .novidade-conteudo {
        padding: 2.5rem 2rem;
    }
    .novidade-section:nth-child(4n+4) .novidade-imagem,
    .novidade-section:nth-child(4n+4) .novidade-barra {
        display: none;
    }

    /* ===== Responsivo: empilha tudo em 1 coluna no mobile ===== */
    @media (max-width: 768px) {
        .lista-novidades {
            grid-template-columns: 1fr;
        }
        .novidade-section {
            grid-row: auto !important;
        }
        .novidade-section:nth-child(4n+1),
        .novidade-section:nth-child(4n+2),
        .novidade-section:nth-child(4n+3),
        .novidade-section:nth-child(4n+4) {
            grid-column: 1;
        }
        .novidade-section:nth-child(4n+1) .novidade {
            flex-direction: column;
        }
        .novidade-section:nth-child(4n+1) .novidade-imagem {
            width: 100%;
        }
        .novidade-section:nth-child(4n+1) .novidade-conteudo {
            border-radius: 0 0 20px 20px;
        }
        .novidade-section:nth-child(4n+3) .novidade-titulo {
            text-align: left;
        }
    }
</style>
<section class="novidade-section">
    <h3 class="novidade-titulo">{{ novidade.titulo }}</h3>
    <article class="novidade">
        <div class="novidade-conteudo">
            <p>{{ novidade.descricao }}</p>
        </div>
        {% if novidade.imagem %}
            <figure class="novidade-imagem">
                <img src="{{ url_for('static', filename='img/' + novidade.imagem) }}" alt="{{ novidade.titulo }}">
            </figure>
        {% else %}
            <div class="novidade-barra"></div>
        {% endif %}
    </article>
</section>
