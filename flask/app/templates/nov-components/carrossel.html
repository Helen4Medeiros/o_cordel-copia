<style>
    .carrossel {
        position: relative;
        display: flex;
        align-items: stretch;
        gap: 1.5rem;
        padding: 0 1rem;
        margin: 0 auto;
        width: 90%; 
    }
 
    .carrossel-borda {
        flex: 1;
        position: relative;
        border: 1px solid #000;
        border-radius: 24px;
        overflow: hidden;
        max-height: 400px; 
    }
 
    .carrossel-slide {
        display: none;
        justify-content: space-between;
        align-items: stretch;
        gap: 2rem;
        height: 100%;
        box-sizing: border-box;
    }
 
    .carrossel-slide.ativo {
        display: flex;
    }
 
    .slide-texto {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 1.5rem 0 1.5rem 3rem; 
    }
 
    .slide-texto h3 {
        font-size: 1.8rem;
        letter-spacing: 0.1em;
        margin: 0;
    }
 
    .slide-texto p {
        font-size: 1.1rem;
        line-height: 1.5;
        margin-bottom: 0; 
    }
 
    .slide-imagem {
        flex-shrink: 0;
        width: 40%;
        margin: 0;
        overflow: hidden;
    }
 
    .slide-imagem img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        border-radius: 0 22px 22px 0;
    }
 
    .btn-anterior,
    .btn-proximo {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        flex-shrink: 0;
        padding: 0.5rem;
        align-self: center;
    }
</style>

<section class="carrossel" data-carrossel>
    <button class="btn-anterior" type="button">&#10094;</button>
    <div class="carrossel-borda">
        {% for destaque in destaques %}
            <article class="carrossel-slide {% if loop.first %}ativo{% endif %}">
                <div class="slide-texto">
                    <h3>{{ destaque.titulo }}</h3>
                    <p>{{ destaque.descricao }}</p>
                </div>
                <figure class="slide-imagem">
                    <img src="{{ url_for('static', filename='img/' + destaque.imagem) }}" alt="{{ destaque.titulo }}">
                </figure>
            </article>
        {% endfor %}
    </div>
    <button class="btn-proximo" type="button">&#10095;</button>
</section>

<script>
    (function () {
        const carrossel = document.querySelector('[data-carrossel]');
        if (!carrossel) return;
 
        const slides = carrossel.querySelectorAll('.carrossel-slide');
        const btnAnterior = carrossel.querySelector('.btn-anterior');
        const btnProximo = carrossel.querySelector('.btn-proximo');
        let indiceAtual = 0;
 
        if (slides.length <= 1) {
            if (btnAnterior) btnAnterior.style.display = 'none';
            if (btnProximo) btnProximo.style.display = 'none';
            return;
        }
 
        function mostrarSlide(novoIndice) {
            slides[indiceAtual].classList.remove('ativo');
            indiceAtual = (novoIndice + slides.length) % slides.length;
            slides[indiceAtual].classList.add('ativo');
        }
 
        btnAnterior.addEventListener('click', function () {
            mostrarSlide(indiceAtual - 1);
        });
 
        btnProximo.addEventListener('click', function () {
            mostrarSlide(indiceAtual + 1);
        });
    })();
</script>
